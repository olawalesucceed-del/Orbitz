<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbit AI — Intelligent Telegram Lead Platform</title>
  <meta name="description" content="Orbit AI — Intelligent Telegram scouting platform. Scan groups, discover leads, and automate outreach intelligently for any niche." />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <!-- Mobile hamburger -->
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">☰</button>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">📡</div>
        <div class="brand-text">
          <span class="brand-name">Orbit AI</span>
          <span class="brand-sub">Lead Intelligence</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="#dashboard" class="nav-item active" data-page="dashboard" id="nav-dashboard">
          <span class="nav-icon">🏠</span>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="#chats" class="nav-item" data-page="chats" id="nav-chats">
          <span class="nav-icon">💬</span>
          <span class="nav-label">Chat Hub</span>
          <span class="nav-badge" id="chats-badge" style="display:none"></span>
        </a>
        <a href="#discovery" class="nav-item" data-page="discovery" id="nav-discovery">
          <span class="nav-icon">🔍</span>
          <span class="nav-label">Group Finder</span>
        </a>
        <a href="#broadcast" class="nav-item" data-page="broadcast" id="nav-broadcast">
          <span class="nav-icon">📢</span>
          <span class="nav-label">Broadcast</span>
        </a>
        <a href="#settings" class="nav-item" data-page="settings" id="nav-settings">
          <span class="nav-icon">⚙️</span>
          <span class="nav-label">Settings</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="connection-status" id="connection-status">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Checking...</span>
        </div>
        <div class="ws-indicator" id="ws-indicator" style="opacity: 0.3">
          <span class="ws-dot"></span> Live
        </div>
        <button class="logout-btn" id="logout-btn" style="display:none">
           Logout
        </button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main-content" id="main-content">
      <!-- Pages injected by JS -->
      <div id="page-container"></div>
    </main>

    <!-- ═══════════ AUTH OVERLAY ═══════════ -->
    <div id="auth-overlay" class="auth-overlay" style="display:none">
      <canvas id="auth-particles"></canvas>
      <div class="auth-card">
        <div class="auth-icon-wrapper">🚀</div>
        <h2 id="auth-title">Orbit AI</h2>
        <p id="auth-sub">Global Lead Intelligence. Access the orbital layer of Telegram data.</p>

        <!-- Step 1: Phone Number -->
        <form id="auth-phone-form">
          <div class="form-group">
            <label>📱 Your Telegram Number</label>
            <div style="display:flex; gap:10px">
              <div class="country-selector" id="country-selector">
                <button type="button" class="country-btn" id="country-btn">
                  <span id="selected-flag">🇺🇸</span>
                  <span id="selected-code">+1</span>
                  <span class="country-arrow">▾</span>
                </button>
                <div class="country-dropdown" id="country-dropdown">
                  <input type="text" class="country-search" id="country-search" placeholder="Search country..." autocomplete="off">
                  <div class="country-list" id="country-list"></div>
                </div>
              </div>
              <input type="tel" id="auth-phone" required placeholder="234 567 8900" autocomplete="tel" style="flex:1; height: 50px">
            </div>
          </div>
          <button type="submit" id="auth-phone-submit" class="btn btn-primary" style="width:100%">Send Login Code →</button>
          <div class="auth-footer-text">We'll send a secure code to your Telegram app.</div>
        </form>

        <!-- Step 2: OTP Verification Code -->
        <form id="auth-code-form" style="display:none;">
          <div class="form-group">
            <label for="auth-code">🔑 Verification Code</label>
            <input type="text" id="auth-code" required placeholder="• • • • •" autocomplete="one-time-code" inputmode="numeric" maxlength="6">
          </div>
          <div class="form-group" id="auth-password-group" style="display:none;">
            <label for="auth-password">🔒 2FA Password</label>
            <input type="password" id="auth-password" placeholder="Enter your 2FA password">
          </div>
          <button type="submit" id="auth-code-submit" class="btn btn-primary" style="width:100%">Verify & Login →</button>
          <button type="button" id="auth-back-btn" class="btn btn-ghost mt-24" style="width:100%">← Go Back</button>
          <div class="auth-footer-text">Check your Telegram app for the code.</div>
        </form>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/countries.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/chats.js"></script>
  <script src="js/discovery.js"></script>
  <script src="js/broadcast.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
