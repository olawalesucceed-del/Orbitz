services:
  - type: web
    name: orbit-ai-backend
    env: docker
    plan: starter
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        value: "sqlite:///./scout.db"
    disk:
      name: orbit-data
      mountPath: /app/data
      sizeGB: 1
